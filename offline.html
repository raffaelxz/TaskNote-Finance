<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TaskNote Finance — Offline</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#c0ff8c">
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192-A.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --primary:#c0ff8c;--primary-dark:#a8e67a;
            --bg:#080808;--card:#161616;--surface:#111111;
            --text:#ffffff;--text2:#a0a0a0;--text3:#555555;
            --border:#232323;--r:22px;--r-pill:100px;
        }

        body{
            font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
            background:var(--bg);color:var(--text);
            min-height:100vh;display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            padding:24px;-webkit-font-smoothing:antialiased;
            position:relative;overflow:hidden;
        }

        /* Background glow */
        body::before{
            content:'';position:fixed;top:50%;left:50%;
            transform:translate(-50%,-50%);
            width:500px;height:500px;
            background:radial-gradient(circle,rgba(192,255,140,0.04) 0%,transparent 65%);
            pointer-events:none;
        }

        /* Animated signal rings */
        .signal-wrap{position:relative;width:120px;height:120px;margin:0 auto 32px;flex-shrink:0}
        .signal-ring{
            position:absolute;border-radius:50%;
            border:1px solid rgba(192,255,140,0.15);
            top:50%;left:50%;transform:translate(-50%,-50%);
            animation:pulse 2.4s ease-out infinite;
        }
        .signal-ring:nth-child(1){width:120px;height:120px;animation-delay:0s}
        .signal-ring:nth-child(2){width:90px;height:90px;animation-delay:0.4s}
        .signal-ring:nth-child(3){width:60px;height:60px;animation-delay:0.8s}
        @keyframes pulse{
            0%{opacity:0;transform:translate(-50%,-50%) scale(0.8)}
            50%{opacity:1}
            100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)}
        }

        .icon-center{
            position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
            width:48px;height:48px;background:rgba(192,255,140,0.08);
            border:1px solid rgba(192,255,140,0.2);border-radius:14px;
            display:flex;align-items:center;justify-content:center;font-size:1.4rem;
        }

        .container{text-align:center;max-width:320px;width:100%;position:relative;z-index:1}

        .app-badge{
            display:inline-flex;align-items:center;gap:6px;
            background:rgba(192,255,140,0.08);border:1px solid rgba(192,255,140,0.15);
            color:var(--primary);font-size:0.68rem;font-weight:600;
            padding:5px 14px;border-radius:var(--r-pill);
            letter-spacing:0.5px;text-transform:uppercase;margin-bottom:20px;
        }
        .app-badge span{width:6px;height:6px;border-radius:50%;background:var(--primary);
            animation:blink 1.5s ease-in-out infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

        h1{font-size:1.5rem;font-weight:800;letter-spacing:-0.4px;margin-bottom:10px}
        .subtitle{font-size:0.85rem;color:var(--text2);line-height:1.7;margin-bottom:28px}

        .btn-retry{
            background:var(--primary);color:#000;border:none;
            padding:13px 32px;border-radius:var(--r-pill);
            font-weight:700;font-size:0.9rem;cursor:pointer;
            font-family:'Inter',sans-serif;
            display:inline-flex;align-items:center;gap:8px;
            transition:all 0.2s;margin-bottom:12px;width:100%;
            justify-content:center;
        }
        .btn-retry:hover{background:var(--primary-dark)}
        .btn-retry:active{transform:scale(0.97)}

        .btn-home{
            background:transparent;color:var(--text2);
            border:1px solid var(--border);
            padding:12px 32px;border-radius:var(--r-pill);
            font-weight:600;font-size:0.85rem;cursor:pointer;
            font-family:'Inter',sans-serif;
            display:inline-flex;align-items:center;gap:8px;
            transition:all 0.2s;width:100%;justify-content:center;
            text-decoration:none;
        }
        .btn-home:hover{border-color:rgba(192,255,140,0.3);color:var(--primary)}

        .divider{width:40px;height:1px;background:var(--border);margin:24px auto}

        /* Info cards */
        .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:24px}
        .info-card{
            background:var(--card);border:1px solid var(--border);
            border-radius:16px;padding:14px 12px;text-align:left;
        }
        .info-icon{font-size:1.1rem;margin-bottom:6px}
        .info-title{font-size:0.75rem;font-weight:600;color:var(--text);margin-bottom:3px}
        .info-desc{font-size:0.65rem;color:var(--text3);line-height:1.5}

        /* Status bar */
        .status-bar{
            position:fixed;bottom:0;left:0;right:0;
            background:rgba(8,8,8,0.95);backdrop-filter:blur(12px);
            border-top:1px solid var(--border);
            padding:12px 20px calc(12px + env(safe-area-inset-bottom));
            display:flex;align-items:center;justify-content:space-between;
        }
        .status-left{display:flex;align-items:center;gap:8px}
        .status-dot{width:8px;height:8px;border-radius:50%;background:#ee5253;flex-shrink:0}
        .status-text{font-size:0.72rem;color:var(--text3);font-weight:500}
        .status-time{font-size:0.68rem;color:var(--text3)}
    </style>
</head>
<body>

    <div class="container">

        <!-- Animated signal -->
        <div class="signal-wrap">
            <div class="signal-ring"></div>
            <div class="signal-ring"></div>
            <div class="signal-ring"></div>
            <div class="icon-center">📡</div>
        </div>

        <!-- Badge -->
        <div class="app-badge">
            <span></span> TaskNote Finance
        </div>

        <!-- Title -->
        <h1>Tidak Ada Koneksi</h1>
        <p class="subtitle">
            Kamu sedang offline.<br>
            Periksa koneksi internetmu dan coba lagi.
        </p>

        <!-- Buttons -->
        <button class="btn-retry" onclick="retryConnection()">
            🔄 Coba Lagi
        </button>
        <a href="./index.html" class="btn-home">
            🏠 Kembali ke Beranda
        </a>

        <div class="divider"></div>

        <!-- Info cards -->
        <div class="info-grid">
            <div class="info-card">
                <div class="info-icon">💾</div>
                <div class="info-title">Data Aman</div>
                <div class="info-desc">Semua data keuanganmu tersimpan lokal di perangkat</div>
            </div>
            <div class="info-card">
                <div class="info-icon">⚡</div>
                <div class="info-title">PWA Ready</div>
                <div class="info-desc">Aplikasi tetap bisa dibuka setelah koneksi kembali</div>
            </div>
        </div>

    </div>

    <!-- Status bar -->
    <div class="status-bar">
        <div class="status-left">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">Offline — Tidak ada koneksi</span>
        </div>
        <span class="status-time" id="statusTime"></span>
    </div>

    <script>
        // Update waktu
        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2,'0');
            const m = String(now.getMinutes()).padStart(2,'0');
            document.getElementById('statusTime').textContent = h + ':' + m;
        }
        updateTime();
        setInterval(updateTime, 1000);

        // Cek koneksi otomatis
        function checkConnection() {
            const dot  = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            if (navigator.onLine) {
                dot.style.background  = '#c0ff8c';
                text.textContent = 'Koneksi tersedia — mengalihkan...';
                setTimeout(() => { window.location.href = './index.html'; }, 1500);
            }
        }

        // Auto retry setiap 5 detik
        setInterval(checkConnection, 5000);

        // Tombol retry manual
        function retryConnection() {
            const btn = document.querySelector('.btn-retry');
            btn.textContent = '⏳ Memeriksa koneksi...';
            btn.disabled = true;
            setTimeout(() => {
                if (navigator.onLine) {
                    window.location.href = './index.html';
                } else {
                    btn.textContent = '🔄 Coba Lagi';
                    btn.disabled = false;
                }
            }, 1500);
        }

        // Langsung redirect jika sudah online
        window.addEventListener('online', () => {
            document.getElementById('statusDot').style.background = '#c0ff8c';
            document.getElementById('statusText').textContent = 'Koneksi tersedia — mengalihkan...';
            setTimeout(() => { window.location.href = './index.html'; }, 1000);
        });
    </script>

</body>
</html>
